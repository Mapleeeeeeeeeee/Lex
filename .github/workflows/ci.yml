name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make build

      - name: Verify Sparkle Bundle
        run: make verify-sparkle

      - name: Test
        run: make test
